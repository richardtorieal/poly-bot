strategy:
  name: "BTCTrendStrategy"
  parameters:
    btc_threshold: 0.000056
    btc_threshold_up: 0.000056
    btc_threshold_down: 0.000055
    lookback_minutes: 2
    er_threshold: 0.6755
    pos_size_pct: 0.03
    exit_profit_pct: 0.004686
    stop_loss_pct: 0.007602
    max_minutes_elapsed: 10.7445
    filter_strike_trend: true


backtest:
  initial_capital: 1000.0
  is_oos_split: 0.8  # 80% In-Sample
  slippage_bps: 10   # Increase to 10bps for more realism
