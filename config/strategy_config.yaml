strategy:
  name: "BTCTrendStrategy"
  parameters:
    btc_threshold: 0.00007222
    btc_threshold_up: 0.00007536
    btc_threshold_down: 0.00007592
    lookback_minutes: 2
    er_threshold: 0.5376
    pos_size_pct: 0.03
    exit_profit_pct: 0.01358
    stop_loss_pct: 0.04984
    max_minutes_elapsed: 10.91
    filter_strike_trend: true

backtest:
  initial_capital: 1000.0
  is_oos_split: 0.8  # 80% In-Sample
  slippage_bps: 50   # 50bps half-spread for true real-world Polymarket parity
