strategy:
  name: "BTCTrendStrategy"
  parameters:
    btc_threshold: 0.00008934
    btc_threshold_up: 0.00009212
    btc_threshold_down: 0.00009377
    lookback_minutes: 2
    er_threshold: 0.5485
    pos_size_pct: 0.03
    exit_profit_pct: 0.01350
    stop_loss_pct: 0.05067
    max_minutes_elapsed: 10.85
    filter_strike_trend: true

backtest:
  initial_capital: 1000.0
  is_oos_split: 0.8  # 80% In-Sample
  slippage_bps: 50   # 50bps half-spread for true real-world Polymarket parity
