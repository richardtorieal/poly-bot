strategy:
  name: "BTCTrendStrategy"
  parameters:
    btc_threshold: 0.00015
    btc_threshold_up: 0.00017
    btc_threshold_down: 0.00010
    lookback_minutes: 2
    er_threshold: 0.5
    pos_size_pct: 0.03
    exit_profit_pct: 0.0052
    stop_loss_pct: 0.015
    max_minutes_elapsed: 8.0


backtest:
  initial_capital: 1000.0
  is_oos_split: 0.8  # 80% In-Sample
  slippage_bps: 10   # Increase to 10bps for more realism
