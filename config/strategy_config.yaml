strategy:
  name: "BTCTrendStrategy"
  parameters:
    btc_threshold: 0.00014227
    btc_threshold_up: 0.00014545
    btc_threshold_down: 0.00014809
    lookback_minutes: 2
    er_threshold: 0.6653
    pos_size_pct: 0.03
    exit_profit_pct: 0.0112
    stop_loss_pct: 0.01512
    max_minutes_elapsed: 10.83
    filter_strike_trend: true
    er_lookback: 2

backtest:
  initial_capital: 1000.0
  is_oos_split: 0.8  # 80% In-Sample
  slippage_bps: 50   # 50bps half-spread for true real-world Polymarket parity
